name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build ParPar static library
        run: make -C internal/parpar libparpar_gf16.a

      - name: Tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          repo-checkout: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            os: linux
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            os: linux
          - name: macos-amd64
            runner: macos-13
            os: macos
          - name: macos-arm64
            runner: macos-latest
            os: macos
          - name: windows-amd64
            runner: windows-latest
            os: windows

    runs-on: ${{ matrix.runner }}
    name: test (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Cache ParPar static library
        uses: actions/cache@v4
        with:
          path: internal/parpar/libparpar_gf16.a
          key: parpar-${{ matrix.name }}-${{ hashFiles('internal/parpar/Makefile', 'internal/parpar/vendor/**', 'internal/parpar/wrapper.*') }}

      - name: Set up MSYS2
        if: matrix.os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc make

      - name: Build ParPar static library (Unix)
        if: matrix.os != 'windows'
        run: make -C internal/parpar libparpar_gf16.a

      - name: Build ParPar static library (Windows)
        if: matrix.os == 'windows'
        shell: msys2 {0}
        run: make -C internal/parpar libparpar_gf16.a

      - name: Add MinGW to PATH
        if: matrix.os == 'windows'
        shell: pwsh
        run: echo "$env:RUNNER_TEMP\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Test
        env:
          CGO_ENABLED: '1'
        run: go test -v ./...

      - name: Test with race detector
        if: matrix.os != 'windows'
        env:
          CGO_ENABLED: '1'
        run: go test -race ./...

      - name: Test pure-Go fallback
        if: matrix.name == 'linux-amd64'
        run: go test -v -tags purego ./...
